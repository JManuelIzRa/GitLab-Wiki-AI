<div class="overlay" (click)="onOverlayClick()">
  <div #trapEl class="modal" role="dialog" aria-modal="true" aria-label="Atajos de teclado" (click)="onModalClick($event)">
    <div class="header">
      <span class="title">atajos de teclado</span>
      <button class="close-btn" (click)="close.emit()" title="Cerrar (Esc)">✕</button>
    </div>
    <table class="shortcut-table">
      <tbody>
        @for (shortcut of shortcuts; track shortcut.keys.join('+')) {
          <tr class="shortcut-row">
            <td class="keys-cell">
              @for (k of shortcut.keys; track k; let last = $last) {
                <kbd class="kbd">{{ k }}</kbd>
                @if (!last) {
                  <span class="plus">+</span>
                }
              }
            </td>
            <td class="desc-cell">{{ shortcut.description }}</td>
          </tr>
        }
      </tbody>
    </table>
    <div class="footer">Presiona <kbd class="kbd">?</kbd> para cerrar</div>
  </div>
</div>
