services:
  # ── Qdrant vector store ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # copy from backend/.env.example and edit
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=sqlite+aiosqlite:///./data/deepwiki.db
    volumes:
      - backend_data:/app/data  # persists SQLite DB between restarts
    depends_on:
      - qdrant
    restart: unless-stopped

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  backend_data:

# ── Notes ──────────────────────────────────────────────────────────────────
# LLM and embedding services are NOT included here — they are user-provided:
#   OPENAI_URL      URL of an OpenAI-compatible LLM server (local or cloud)
#   EMBEDDING_URL   URL of an embedding server (local or cloud)
#
# Quick start:
#   1. cp backend/.env.example backend/.env  # edit OPENAI_URL, EMBEDDING_URL, etc.
#   2. docker compose up --build
#   3. Open http://localhost:5173
